<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/ico" href="./assets/images/icons/webIcon/webIcon300.ico" sizes="16×16">
  <link rel="icon" type="image/ico" href="./assets/images/icons/webIcon/webIcon300.ico" sizes="24×24">
  <link rel="icon" type="image/ico" href="./assets/images/icons/webIcon/webIcon300.ico" sizes="32×32">
  <link rel="icon" type="image/ico" href="./assets/images/icons/webIcon/webIcon300.ico" sizes="48×48">
  <link rel="icon" type="image/ico" href="./assets/images/icons/webIcon/webIcon300.ico" sizes="64×64">
  <link rel="icon" type="image/ico" href="./assets/images/icons/webIcon/webIcon300.ico" sizes="96×96">
  <link rel="icon" type="image/ico" href="./assets/images/icons/webIcon/webIcon300.ico" sizes="128×128">
  <meta property="og:title" content="Sohail K. Shaikh - Frontend Developer | MERN Stack" />
  <meta property="og:description" content="Frontend Developer specializing in React and scalable UI architecture." />
  <meta property="og:image" content="./assets/images/icons/webIcon/webIcon300.ico" />
  <meta property="og:url" content="https://sohailkshaikh-117.github.io/vanilla-js-portfolio/" />
  <meta property="og:type" content="website" />
  <link rel="stylesheet" href="styles/style.css" />
  <link rel="stylesheet" href="styles/styleUtilities.css" />
  <link rel="stylesheet" href="styles/mediaQuery.css" />
  <link rel="stylesheet" href="styles/spinner.css">
  <link rel="stylesheet" href="styles/bgAnimation.css">
  <script type="module" src="scripts/script.js"></script>
  <title>Sohail Shaikh | MERN Stack Developer</title>
</head>

<body class="calm-blue">
  <div class="loaderOverlay" id="loaderOverlay">
    <div class="glass-card">
      <div class="loaderContent section-heading" id="loaderContent">
        LOADING
        <span class="loaderDot dot-1"></span>
        <span class="loaderDot dot-2"></span>
        <span class="loaderDot dot-3"></span>
        <span class="loaderDot dot-4"></span>
      </div>
    </div>
  </div>
  <div class="bg-video-control hideElement" id="bgVideoControl"></div>
  <div class="bg-video hideElement">
    <video class="" id="bgVideo" autoplay muted loop playsinline>
      <!-- <source src="/assets/video/vid1.webm" type="video/mp4" /> -->
      <!-- <source src="/assets/video/vid7" type="video/mp4" /> -->
    </video>
    <div class="bg-overlay"></div>
  </div>
  <div class="css-background">
    <div class="background-container">
      <div class="halos-container">
        <div class="center-ring" id="center-ring"></div>
        <div class="halo halo-1" id="halo-1">
          <div class="sub-halo sub-halo-1"></div>
        </div>
        <div class="halo halo-2" id="halo-2">
          <div class="sub-halo sub-halo-2"></div>
        </div>
        <div class="halo halo-3" id="halo-3">
          <div class="sub-halo sub-halo-3"></div>
        </div>
        <div class="halo halo-4" id="halo-4">
          <div class="sub-halo sub-halo-4"></div>
        </div>
        <div class="halo halo-5" id="halo-5">
          <div class="sub-halo sub-halo-5"></div>
        </div>
        <div class="halo halo-6" id="halo-6">
          <div class="sub-halo sub-halo-6"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="hamburgerIcon" id="hamburgerIcon">
    <div class="line l-up"></div>
    <div class="line l-mid"></div>
    <div class="line l-dw"></div>
  </div>
  <div class="hamburgerMenu hideElementWithOpacity" id="hamburgerMenu">
    <div class="hamburgerMenuContainer">
      <button class="hamburgerMenuItem" id="hamburgerMenu_home">Home</button>
      <button class="hamburgerMenuItem" id="hamburgerMenu_work">Work</button>
      <button class="hamburgerMenuItem" id="hamburgerMenu_skill">
        Skill
      </button>
      <button class="hamburgerMenuItem" id="hamburgerMenu_about">
        About
      </button>
      <button class="hamburgerMenuItem" id="hamburgerMenu_contact">
        Contact
      </button>
    </div>
  </div>
  <div class="menuBar hideElementWithScale" id="menuBar">
    <div class="menuBarContainer" id="menuBarContainer">
      <button class="menuSlider" id="menuSlider"></button>
      <button class="menuItem" id="menu_contact">Contact</button>
      <button class="menuItem" id="menu_about">About</button>
      <button class="menuItem menuActive" id="menu_home">Home</button>
      <button class="menuItem" id="menu_work">Work</button>
      <button class="menuItem" id="menu_skill">Skill</button>
    </div>
  </div>
  <div class="imageGalleryLargeView hideElementWithScale" id="imageGalleryLargeView">
    <button class="imageGalleryLargeViewCancel btn-cross" id="imageGalleryLargeViewCancel"></button>
  </div>
  <main class="rootContainer hideElementWithScale" id="rootContainer">
    <section class="view header" id="home">
      <section class="headerWrapper" id="headerWrapper">
        <div class="headerContainer glass-card" id="headerContainer">
          <div class="headerTitle" id="headerTitle">
            <span class="headerTitlePart1 primary-hero-heading" id="headerTitlePart1"></span>
            <span class="headerTitlePart2 primary-hero-heading hero-highlight-text" id="headerTitlePart2"></span>
          </div>
          <div class="headerTag secondary-hero-heading highlight-secondary-text" id="headerTag"></div>
          <!-- <div class="divider"></div> -->
          <div class="headerDescription tertiary-hero-heading" id="headerDescription"></div>
          <button class="headerViewWorkButton btn-glass" id="headerViewWorkButton"></button>
          <!-- <img class="headerImage" id="headerImage" /> -->
        </div>
      </section>
    </section>
    <section class="view projectSection" id="work">
      <div class="projectSectionContainer glass-card">
        <div class="glass-card-title-section" id="projectHeader">
          <div class="glass-card-title-wrap" id="projectTitleSectionContainer">
            <div class="section-heading" id="projectSectionTitle"></div>
            <div class="section-sub-heading" id="projectSectionSecondaryTitle"></div>
          </div>
        </div>
        <div class="projectSliderWrapper glass-card-content">
          <div class="projectGrid" id="projectGrid">
            <template class="projectBox" id="projectBox">
              <div class="projectBoxWrapper" id="projectBoxWrapper">
                <div class="number-card">
                  <div class="projectNumber">
                    <div class="projectNumberText" id="projectNumber"></div>
                  </div>
                </div>
                <div class="projectWrapperRow1">
                  <div class="projectTitleBox">
                    <!-- <img class="projectTitlImage" id="projectTitlImage" src="/assets/images/illustrations/RE.png" /> -->
                    <div class="projectTitle primary-text" id="projectTitle"></div>
                  </div>
                </div>
                <div class="card-divider dv1"></div>
                <div class="projectWrapperRow2">
                  <!-- <img
                    class="projectImage"
                    id="projectImage"
                    src="/assets/images/illustrations/RE.png"
                  /> -->
                  <div class="projectDescText tertiary-text" id="projectDescText"></div>
                </div>
                <div class="card-divider dv2"></div>
                <div class="projectWrapperRow3">
                  <div class="projectMadeWithBox">
                    <div class="projectMadeWithLabel secondary-text">
                      Made with:
                    </div>
                    <div class="projectMadeWithItems" id="projectMadeWithItems">
                      <template id="projectMadeWithItemTemplate">
                        <div class="projectMadeWithItem label-highlight" id="projectMadeWithItem">
                          Javascript
                        </div>
                      </template>
                      <!-- <div class="projectMadeWithItem label-highlight">
                        Javascript
                      </div>
                      <div class="projectMadeWithItem label-highlight">
                        HTML
                      </div>
                      <div class="projectMadeWithItem label-highlight">CSS</div>
                      <div class="projectMadeWithItem label-highlight">
                        Google Fonts
                      </div>
                      <div class="projectMadeWithItem label-highlight">
                        Google Fonts
                      </div>
                      <div class="projectMadeWithItem label-highlight">
                        Google Fonts
                      </div> -->
                    </div>
                  </div>
                </div>
                <div class="projectWrapperRow4">
                  <button id="projectDetailsIndexPageButton"
                    class="projectDetailsIndexPageButton btn-glass btn-glass-small"></button>
                </div>
              </div>
            </template>
          </div>
          <div class="navButtons">
            <button class="leftNav navButton" id="SliderLeftNav">
            </button>
            <button class="rightNav navButton" id="SliderRightNav">
            </button>
          </div>
          </button>
        </div>
      </div>
    </section>
    <section class="view projectDetailsSection" id="projectDetailsView">
      <div class="projectDetailsContainer glass-card">
        <button class="projectDetailsCancel" id="projectDetailsCancel">
          <div class="btn-cross" id="projectDetailsCancelImg"></div>
        </button>
        <div class="glass-card-title-section" id="projectDetailsHeader">
          <div class="glass-card-title-wrap" id="projectDetailsHeaderTitleSectionContainer">
            <div class="section-heading-secondary" id="projectDetailsHeaderSectionTitle">
            </div>
          </div>
        </div>
        <div class="projectDetailsWrapper glass-card-content">
          <div class="detailsTabsContainer custom-scrollbar" id="detailsTabsContainer">
          </div>
          <template id="detailsTabTemplate">
            <div class="detailsTabWrapper" id="detailsTabWrapper">
              <button class="detailsTabIcon TabIconDisplay" id="detailsTabIcon"></button>
              <button class="detailsTabText" id="detailsTabText"></button>
            </div>
          </template>
          <div class="detailsContentContainer" id="detailsContentContainer"></div>
          <template id="detailsContentContainerTemplate">
            <div class="detailsContentContainerWrapper" id="detailsContentContainerWrapper">
              <div class="detailsTitle primary-text highlight-text" id="detailsTitle"></div>
              <div class="detailsContent custom-scrollbar" id="detailsContent"></div>
              <template class="plainListTemplate" id="plainListTemplate">
                <div class="plainListWrapper">
                  <span class="plainListBulletIcon" id="plainListBulletIcon"></span>
                  <span class="primaryText highlight-secondary-text" id="primaryText"></span>
                  <span class="secondaryText secondary-text" id="secondaryText"></span>
                </div>
              </template>
              <div class="largeIconTextBoxContainer hideElement" id="largeIconTextBoxContainer">
                <template id="largeIconTextBoxTemplate">
                  <div class="largeIconTextBoxWrapper">
                    <div class="largeIcon" id="largeIcon"></div>
                    <span class="iconText secondary-text" id="iconText"></span>
                  </div>
                </template>
              </div>
              <div class="imageGallerySmallView hideElement" id="imageGallerySmallView">
                <template id="imageGallerySmallViewTemplate">
                  <div class="imageGallerySmallViewWrapper" id="imageGallerySmallViewWrapper">
                    <div class="imageGallerySrc" id="imageGallerySrc"></div>
                    <div class="imageGalleryLabel secondary-text" id="imageGalleryLabel"></div>
                  </div>
                </template>
              </div>
              <div class="linksViewContrainer hideElement" id="linksViewContrainer">
                <template id="linksViewTemplate">
                  <a href="" target="_blank" rel="noopener noreferrer" class="linksViewWrapper" id="linksViewWrapper">
                    <div class="linkView secondary-text" id="linkView"></div>
                    <div class="linkIcon" id="projectLinks"></div>
                  </a>
                </template>
              </div>
            </div>
          </template>
        </div>
      </div>
    </section>
    <section class="view techSkillSection" id="skill">
      <div class="techSkillContainer glass-card">
        <div class="glass-card-title-section" id="techSkillHeader">
          <div class="glass-card-title-wrap" id="techSkillHeaderContainer">
            <div class="section-heading" id="techSkillTitle"></div>
          </div>
        </div>
        <div class="techSkillContent glass-card-content custom-scrollbar" id="techSkillContent">
          <template id="skillGroup">
            <div class="skillGroupWrapper" id="skillGroupWrapper">
              <div class="skillCategory primary-text highlight-text" id="skillCategory"></div>
              <div class="skillPartition primary-text highlight-text" id="skillCategory">:</div>
              <div class="skillTags" id="skillTags">
                <template id="skillTag">
                  <span class="skillTagWrapper secondary-text" id="skillTagWrapper"></span>
                </template>
              </div>
            </div>
          </template>
        </div>
      </div>
    </section>
    <section class="view aboutMeSection" id="about">
      <div class="aboutMeContainer glass-card">
        <div class="glass-card-title-section" id="aboutHeader">
          <div class="glass-card-title-wrap" id="aboutHeaderContainer">
            <div class="section-heading" id="aboutTitle"></div>
          </div>
        </div>
        <div class="aboutContent glass-card-content custom-scrollbar" id="aboutContent">
          <div class="aboutSummeryContent" id="aboutSummeryContent">
            <template id="aboutSummeryDescription">
              <div class="aboutSummeryDescriptionWrapper secondary-text" id="aboutSummeryDescriptionWrapper"></div>
            </template>
          </div>
          <button id="creditsLink" class="creditsLink btn-glass btn-glass-small"></button>
        </div>
      </div>
    </section>
    <section class="view contactSection" id="contact">
      <div class="contactSectionContainer glass-card">
        <div class="glass-card-title-section" id="contentHeader">
          <div class="glass-card-title-wrap" id="contentHeaderContainer">
            <div class="section-heading" id="contactTitle"></div>
          </div>
        </div>
        <div class="contactContent glass-card-content custom-scrollbar" id="contactContent">
          <div class="contactText secondary-text" id="contactText"></div>
          <div class="contactDetails" id="contactDetails">
            <div class="contactDescriptionWrapper secondary-text" id="contactDescriptionWrapper">
              <template id="externalLinkTemplate">
                <a href="" target="_blank" rel="noopener noreferrer" class="linksViewWrapper" id="contactLink">
                  <div class="linkView secondary-text" id="contactLinkText"></div>
                  <div class="" id="contactDescriptionIcon"></div>
                </a>
              </template>
              <template id="downloadDocTemplate">
                <a href="" download target="_blank" rel="noopener noreferrer" class="linksViewWrapper" id="contactLink">
                  <div class="linkView secondary-text" id="contactLinkText"></div>
                  <div class="" id="contactDescriptionIcon"></div>
                </a>
              </template>
            </div>
          </div>
        </div>
      </div>
    </section>
    <section class="view creditDetails" id="credit">
      <div class="creditDetailsContainer glass-card">
        <button class="creditDetailsCancel" id="creditDetailsCancel">
          <div class="btn-cross" id="projectDetailsCancelImg"></div>
        </button>
        <div class="glass-card-title-section" id="creditDetailsHeader">
          <div class="glass-card-title-wrap" id="creditDetailsTitleContainer">
            <div class="section-heading section-heading-small" id="creditDetailsTitle"></div>
          </div>
        </div>
        <div class="creditDetailsContent glass-card-content custom-scrollbar" id="creditDetailsContent">
          <div class="creditDetailsContentWrapper" id="creditDetailsContentWrapper">

            <template id="creditPlainTextTemplate">
              <div class="creditPlainTextWrapper">
                <span class="creditPlainTextPrimary highlight-secondary-text" id="creditPlainTextPrimary"></span>
                <span class="creditPlainTextSecondary secondary-text" id="creditPlainTextSecondary"></span>
              </div>
            </template>

            <template id="creditBulletPointsTemplate">
              <div class="creditBulletPointsWrapper" id="creditBulletPointsWrapper">
                <template id="creditSingleBulletTemplate">
                  <div class="creditSingleBulletTemplateWrapper" id="creditSingleBulletTemplateWrapper">
                    <span class="creditPlainTextBulletIcon"></span>
                    <span class="creditBulletPointsPrimary highlight-secondary-text"
                      id="creditBulletPointsPrimary"></span>
                    <span class="creditBulletPointsSecondary secondary-text" id="creditBulletPointsSecondary"></span>
                  </div>
                </template>
              </div>
            </template>

            <template id="creditLinksTemplate">
              <div class="creditLinksWrapper" id="creditLinksWrapper">

                <div class="creditSectionLabel secondary-text" id="creditSectionLabel"></div>

                <div class="creditSectionContent" id="creditSectionContent">

                  <template id="creditSectionContentTemplate">
                    <div class="creditSectionContentWrapper" id="creditSectionContentWrapper">

                      <a href="" target="_blank" rel="noopener noreferrer"
                        class="creditLink linksViewWrapper linksViewWrapper-small" id="creditLink">
                        <div class="linkView secondary-text" id="contactLinkText"></div>
                        <div class="" id="creditLinkIcon"></div>
                      </a>

                    </div>
                  </template>

                </div>
              </div>
            </template>

          </div>
        </div>
      </div>
    </section>
  </main>
</body>

</html>
